<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SuspectBiz — Jerusalem Business Verification</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--surface:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;
  --accent:#2563eb;--accent-bg:#eff6ff;--danger:#dc2626;--warning:#d97706;--success:#16a34a;
  --r-sm:8px;--r-md:12px;--r-lg:16px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{cursor:pointer;font-family:inherit;transition:opacity .15s,background .15s,border-color .15s}
input,select,textarea{font-family:inherit;font-size:14px}
a{text-decoration:none}
.hidden{display:none!important}

/* Layout */
#app{min-height:100vh}
.page{display:none;min-height:100vh}
.page.active{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* Badge */
.badge{display:inline-flex;align-items:center;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap}

/* Score pill */
.score-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600}
.score-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.score-high{background:#fef2f2;color:#dc2626}.score-high .score-dot{background:#dc2626}
.score-med{background:#fffbeb;color:#d97706}.score-med .score-dot{background:#d97706}
.score-low{background:#f0fdf4;color:#16a34a}.score-low .score-dot{background:#16a34a}

/* Topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:8px;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:12px}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;flex-shrink:0;font-size:12px}
.btn-ghost{background:none;border:1px solid var(--border);border-radius:var(--r-sm);padding:5px 12px;font-size:13px;color:var(--muted)}
.btn-ghost:hover{background:var(--bg)}
.btn-back{background:none;border:none;color:var(--accent);font-size:13px;font-weight:500;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:20px}

/* Login */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f0f4ff 0%,#f8f9fa 60%,#fef9f0 100%);padding:24px}
.login-box{width:100%;max-width:380px}
.login-header{text-align:center;margin-bottom:32px}
.login-logo{width:52px;height:52px;border-radius:14px;background:#2563eb;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
.login-title{font-size:22px;font-weight:700}
.login-sub{color:var(--muted);font-size:14px;margin-top:4px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:28px}
.label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.input-field{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;outline:none;background:var(--surface)}
.input-field:focus{border-color:var(--accent)}
.role-btns{display:flex;gap:8px;margin-bottom:20px}
.role-btn{flex:1;padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--muted);font-weight:600;font-size:13px}
.role-btn.active{border-color:#2563eb;background:#eff6ff;color:#2563eb}
.btn-primary{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-weight:600;font-size:15px}
.btn-primary:hover{opacity:.9}
.login-footer{text-align:center;color:var(--muted);font-size:12px;margin-top:20px}

/* Admin Dashboard */
.admin-content{padding:24px;max-width:1200px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 20px}
.stat-value{font-size:26px;font-weight:700}
.stat-label{font-size:12px;color:var(--muted);margin-top:2px}
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1 1 200px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;background:var(--surface);outline:none}
.search-input:focus{border-color:var(--accent)}
.filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;background:var(--surface);outline:none}
.btn-export{padding:8px 16px;background:#f3f4f6;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.addr-en{font-weight:500;font-size:13px}
.addr-he{font-size:12px;color:var(--muted);direction:rtl;text-align:right;margin-top:1px}
.btn-view{padding:5px 12px;border:1px solid var(--border);border-radius:7px;background:var(--surface);font-size:12px;font-weight:500;color:var(--accent)}
.btn-view:hover{background:var(--accent-bg)}

/* Detail page */
.detail-content{padding:24px;max-width:860px;margin:0 auto}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.detail-addr-en{font-size:18px;font-weight:600}
.detail-addr-he{color:var(--muted);font-size:13px;direction:rtl;text-align:right;margin-top:2px}
.detail-meta{font-size:11px;font-weight:600;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.tab-bar{display:flex;gap:2px;margin-bottom:16px;background:var(--surface);border-radius:10px;padding:4px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:7px 0;border:none;border-radius:8px;background:transparent;color:var(--muted);font-weight:500;font-size:13px;text-transform:capitalize}
.tab-btn.active{background:#2563eb;color:#fff}
.tab-panel{display:none}
.tab-panel.active{display:block}
.biz-card{margin-bottom:12px}
.biz-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
.biz-name{font-weight:600;font-size:15px}
.biz-cat{font-size:12px;color:var(--muted);margin-top:2px}
.biz-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.reasoning{font-size:13px;color:#374151;background:#f9fafb;border-radius:8px;padding:10px 14px;margin-bottom:12px;line-height:1.6}
.sources{display:flex;flex-wrap:wrap;gap:6px}
.source-link{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);font-size:12px;color:var(--accent);background:var(--accent-bg)}
.source-link:hover{opacity:.8}
.pipeline-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.step-icon{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:1px}
.step-name{font-weight:500;font-size:13px}
.step-detail{color:var(--muted);font-size:12px}
.empty-state{padding:32px;text-align:center;color:var(--muted)}

/* Surveyor */
#surveyor-page{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}
.surveyor-list{padding:16px}
.surveyor-hint{font-size:13px;color:var(--muted);margin-bottom:12px}
.addr-card-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:left;width:100%;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.addr-card-btn:hover{border-color:#2563eb30;background:#f9fafb}
.surveyor-detail{padding:16px}
.addr-box{padding:16px;margin-bottom:12px}
.biz-mini{padding:14px;margin-bottom:8px}
.validate-btn{width:100%;margin-top:16px;padding:15px;background:#2563eb;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:600;box-shadow:0 4px 14px rgba(37,99,235,.25)}
.validate-btn:hover{opacity:.9}
.already-validated{padding:14px;margin-top:12px;border-color:#bbf7d0;background:#f0fdf4;border-radius:var(--r-md);border:1px solid #bbf7d0}

/* Form */
.surveyor-form{padding:16px}
.warn-box{padding:14px 16px;border:2px solid #fcd34d;background:#fffbeb;border-radius:12px;margin-bottom:16px}
.warn-title{font-size:13px;font-weight:500}
.warn-sub{font-size:12px;color:var(--muted);margin-top:2px}
.form-section{margin-bottom:16px}
.form-label{font-weight:600;font-size:13px;display:block;margin-bottom:10px}
.option-btn{display:flex;width:100%;padding:13px 16px;border:2px solid var(--border);border-radius:12px;background:var(--surface);text-align:left;gap:12px;align-items:center;margin-bottom:8px}
.option-btn.selected-red{border-color:#dc2626;background:#fef2f2}
.option-btn.selected-yellow{border-color:#d97706;background:#fffbeb}
.option-btn.selected-green{border-color:#16a34a;background:#f0fdf4}
.option-label{font-weight:600;font-size:14px}
.option-desc{font-size:12px;color:var(--muted);margin-top:1px}
textarea.notes{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;resize:none;outline:none;background:var(--surface)}
textarea.notes:focus{border-color:var(--accent)}
.photo-zone{padding:16px;border:2px dashed var(--border);border-radius:12px;text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px}
.photo-sub{font-size:11px;margin-top:4px}
.submit-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:600;transition:background .2s,color .2s}
.submit-btn.ready{background:#2563eb;color:#fff}
.submit-btn.disabled{background:#e5e7eb;color:#9ca3af}

/* Success */
.success-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.success-icon{font-size:56px;margin-bottom:16px}
.success-title{font-size:18px;font-weight:600}
.success-sub{color:var(--muted);font-size:14px;margin-top:8px}

/* Responsive tweaks */
@media(max-width:640px){
  .admin-content{padding:12px}
  th,td{padding:8px 10px}
  .topbar{padding:0 12px}
}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login-page" class="page active">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f0f4ff 0%,#f8f9fa 60%,#fef9f0 100%);padding:24px">
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">SB</div>
        <div class="login-title">SuspectBiz</div>
        <div class="login-sub">Jerusalem Business Verification System</div>
      </div>
      <div class="login-card card">
        <div class="label" style="margin-bottom:10px">Sign in as</div>
        <div class="role-btns">
          <button class="role-btn active" id="role-admin" onclick="selectRole('admin')">🖥️ Admin</button>
          <button class="role-btn" id="role-surveyor" onclick="selectRole('surveyor')">📱 Field Surveyor</button>
        </div>
        <div style="margin-bottom:14px">
          <label class="label">Email</label>
          <input id="login-email" class="input-field" value="admin@city.gov.il"/>
        </div>
        <div style="margin-bottom:20px">
          <label class="label">Password</label>
          <input class="input-field" type="password" value="••••••••"/>
        </div>
        <button class="btn-primary" onclick="doLogin()">Sign In</button>
      </div>
      <div class="login-footer">Demo system · LangGraph + Tavily + Supabase + Next.js</div>
    </div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-page" class="page">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo">SB</div>
      <span style="font-weight:600;font-size:15px">SuspectBiz</span>
      <span style="color:var(--muted);font-size:13px">Admin Portal</span>
    </div>
    <div class="topbar-right">
      <div class="avatar" id="admin-avatar" style="width:30px;height:30px;background:#2563eb;font-size:11px">AD</div>
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="admin-content">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="controls">
      <input class="search-input" id="search-input" placeholder="Search addresses..." oninput="renderTable()"/>
      <select class="filter-select" id="filter-select" onchange="renderTable()">
        <option value="all">All Statuses</option>
        <option value="verified">Verified</option>
        <option value="pending">Pending</option>
        <option value="investigating">Investigating</option>
        <option value="no_business">No Business</option>
      </select>
      <button class="btn-export">⬇ Export CSV</button>
    </div>
    <div class="card" style="overflow:hidden">
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Address</th><th>Status</th><th>Businesses</th><th>Score</th><th>Assigned To</th><th>Updated</th><th></th>
            </tr>
          </thead>
          <tbody id="addr-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div id="detail-page" class="page">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo">SB</div>
      <span style="font-weight:600;font-size:15px">SuspectBiz</span>
    </div>
    <div class="topbar-right">
      <button class="btn-ghost" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="detail-content" id="detail-content"></div>
</div>

<!-- SURVEYOR PAGE -->
<div id="surveyor-page" class="page">
  <div class="topbar">
    <div class="topbar-brand" id="surveyor-topbar-left">
      <div class="logo" style="background:#7c3aed">SB</div>
      <span style="font-weight:600;font-size:15px" id="surveyor-topbar-title">My Assignments</span>
    </div>
    <div class="topbar-right">
      <div class="avatar" style="width:28px;height:28px;background:#7c3aed;font-size:10px">YC</div>
      <button class="btn-ghost" onclick="logout()" style="font-size:12px;padding:4px 8px">Out</button>
    </div>
  </div>
  <div id="surveyor-inner"></div>
</div>

<!-- SUCCESS -->
<div id="success-page" class="page">
  <div class="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">Validation Submitted!</div>
    <div class="success-sub">Returning to your assignments...</div>
  </div>
</div>

</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const SURVEYORS = {
  surveyor1: { name: "Yosef Cohen", initials: "YC" },
  surveyor2: { name: "Miriam Levy", initials: "ML" },
};

const ADDRESSES = [
  {
    id:"a1", addressEn:"42 Jaffa St, Apt 3, Jerusalem", addressHe:"רחוב יפו 42, דירה 3, ירושלים",

    ]
  },
  {

    status:"pending", score:0.74, assignedTo:"surveyor2", updated:"2024-01-14", validated:null,
    businesses:[
      { name:"Jerusalem Tax Advisors", cat:"Financial Services", active:true, conf:0.78, score:0.74,
        reasoning:"Professional registry lists active license at this address. Facebook page active with posts from last month. Confidence slightly reduced due to no official website found.",
        sources:[{icon:"📋",title:"Professional Registry – JTA",url:"#"},{icon:"💬",title:"Facebook Business Page",url:"#"}] },
    ],
    pipeline:[
      {step:"Query Builder",status:"done",detail:"Generated 4 Hebrew queries"},
      {step:"Tavily Search",status:"done",detail:"Retrieved 19 results"},

    status:"investigating", score:0.62, assignedTo:null, updated:"2024-01-15", validated:null,
    businesses:[],
    pipeline:[
      {step:"Query Builder",status:"done",detail:"Generated 6 Hebrew queries"},
      {step:"Tavily Search",status:"done",detail:"Retrieved 31 results"},

      {step:"Final Scoring",status:"pending",detail:"Waiting for investigator"},
    ]
  },
  {
    id:"a4", addressEn:"31 King George St, Apt 2, Jerusalem", addressHe:"רחוב קינג ג'ורג' 31, דירה 2, ירושלים",
    status:"no_business", score:0.18, assignedTo:"surveyor1", updated:"2024-01-13", validated:"no_business",
    businesses:[],
    pipeline:[
      {step:"Query Builder",status:"done",detail:"Generated 4 queries"},
      {step:"Tavily Search",status:"done",detail:"Retrieved 11 results"},

  },
  {
    id:"a5", addressEn:"8 Agrippas St, Apt 5, Jerusalem", addressHe:"רחוב אגריפס 8, דירה 5, ירושלים",
    status:"pending", score:0.85, assignedTo:"surveyor2", updated:"2024-01-15", validated:null,
    businesses:[
      { name:"Mahane Yehuda Import & Export", cat:"Import / Export", active:true, conf:0.88, score:0.88,
        reasoning:"Government registrar shows active company registered at this address. Official registration date 2019, last annual report filed 2023.",
        sources:[{icon:"🏛️",title:"Companies Registrar – MYE",url:"#"}] },
      { name:"Spice Garden Restaurant", cat:"Food & Catering", active:true, conf:0.82, score:0.82,
        reasoning:"Listed on food directory and Google Maps, both confirming address. 47 reviews, last review 2 weeks ago. Likely home-based catering or ghost kitchen.",
        sources:[{icon:"📋",title:"Rest.co.il – Spice Garden",url:"#"},{icon:"🗺️",title:"Google Maps",url:"#"}] },
      { name:"Ronen IT Solutions", cat:"Technology", active:true, conf:0.76, score:0.76,
        reasoning:"Website and LinkedIn both list residential address. Freelance IT contractor, likely operating from home.",
        sources:[{icon:"💬",title:"LinkedIn – Ronen IT",url:"#"},{icon:"🌐",title:"Official Website",url:"#"}] },
    ],
    pipeline:[
      {step:"Query Builder",status:"done",detail:"Generated 6 Hebrew queries"},
      {step:"Tavily Search",status:"done",detail:"Retrieved 44 results"},
      {step:"Extraction",status:"done",detail:"Extracted 4 candidates"},
      {step:"Business Investigator",status:"done",detail:"Verified 3/4; 1 false positive removed"},
      {step:"Final Scoring",status:"done",detail:"3 businesses confirmed suspicious"},
    ]
  },
];

// ── State ─────────────────────────────────────────────────────────────────────
let currentRole = "admin";
let selectedValidation = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function scorePill(s) {
  const cls = s >= 0.8 ? "score-high" : s >= 0.5 ? "score-med" : "score-low";
  return `<span class="score-pill ${cls}"><span class="score-dot"></span>${Math.round(s*100)}%</span>`;
}
function badge(label, color, bgColor) {
  return `<span class="badge" style="color:${color};background:${bgColor}">${label}</span>`;
}
const STATUS = {
  verified: {label:"Verified", color:"#dc2626"},
  pending: {label:"Pending Review", color:"#d97706"},
  investigating: {label:"Investigating", color:"#2563eb"},
  no_business: {label:"No Business", color:"#16a34a"},
};
function statusBadge(s) {
  const st = STATUS[s];
  return badge(st.label, st.color, st.color+"20");
}
function e(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => { if(k==="class") el.className=v; else if(k.startsWith("on")) el.addEventListener(k.slice(2),v); else el.setAttribute(k,v); });
  children.forEach(c => { if(typeof c==="string") el.insertAdjacentHTML("beforeend",c); else if(c) el.appendChild(c); });
  return el;
}

// ── Pages ─────────────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ── Login ─────────────────────────────────────────────────────────────────────
function selectRole(r) {
  currentRole = r;
  document.getElementById("role-admin").classList.toggle("active", r==="admin");
  document.getElementById("role-surveyor").classList.toggle("active", r==="surveyor");
  document.getElementById("login-email").value = r==="admin" ? "admin@city.gov.il" : "yosef@city.gov.il";
}
function doLogin() {
  if (currentRole === "admin") {
    renderAdminDashboard();
    showPage("admin-page");
  } else {
    renderSurveyorList();
    showPage("surveyor-page");
  }
}
function logout() {
  showPage("login-page");
}

// ── Admin ─────────────────────────────────────────────────────────────────────
function renderAdminDashboard() {
  // Stats
  const stats = [
    { label:"Total Addresses", value: ADDRESSES.length, color:"#2563eb" },
    { label:"Verified Suspicious", value: ADDRESSES.filter(a=>a.status==="verified").length, color:"#dc2626" },
    { label:"Pending Review", value: ADDRESSES.filter(a=>a.status==="pending").length, color:"#d97706" },
    { label:"Businesses Found", value: ADDRESSES.reduce((s,a)=>s+a.businesses.length,0), color:"#7c3aed" },
  ];
  const sg = document.getElementById("stats-grid");
  sg.innerHTML = stats.map(s => `
    <div class="stat-card">
      <div class="stat-value" style="color:${s.color}">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>`).join("");
  renderTable();
}

function renderTable() {
  const search = (document.getElementById("search-input")||{value:""}).value.toLowerCase();
  const filter = (document.getElementById("filter-select")||{value:"all"}).value;
  const tbody = document.getElementById("addr-table-body");
  if (!tbody) return;
  const filtered = ADDRESSES.filter(a => {
    const ms = a.addressEn.toLowerCase().includes(search) || a.addressHe.includes(search);
    const mf = filter==="all" || a.status===filter;
    return ms && mf;
  });
  tbody.innerHTML = filtered.map(a => {
    const sv = a.assignedTo ? SURVEYORS[a.assignedTo] : null;
    const svHtml = sv
      ? `<div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:24px;height:24px;background:#7c3aed;font-size:9px">${sv.initials}</div><span style="font-size:13px">${sv.name}</span></div>`
      : `<span style="color:var(--muted);font-size:13px">Unassigned</span>`;
    return `<tr>
      <td><div class="addr-en">${a.addressEn}</div><div class="addr-he">${a.addressHe}</div></td>
      <td>${statusBadge(a.status)}</td>
      <td style="text-align:center;font-weight:600">${a.businesses.length || "—"}</td>
      <td>${scorePill(a.score)}</td>
      <td>${svHtml}</td>
      <td style="color:var(--muted);font-size:12px">${a.updated}</td>
      <td><button class="btn-view" onclick="showDetail('${a.id}')">View →</button></td>
    </tr>`;
  }).join("");
}

// ── Detail ────────────────────────────────────────────────────────────────────
function showDetail(id) {
  const a = ADDRESSES.find(x => x.id === id);
  if (!a) return;

  const stepIcon = {done:"✓",running:"↻",pending:"○",skipped:"—"};
  const stepColor = {done:"#16a34a",running:"#2563eb",pending:"#9ca3af",skipped:"#d1d5db"};

  const bizHtml = a.businesses.length === 0
    ? `<div class="card empty-state">No businesses found at this address.</div>`
    : a.businesses.map(b => `
      <div class="card biz-card" style="padding:20px">
        <div class="biz-header">
          <div><div class="biz-name">${b.name}</div><div class="biz-cat">${b.cat}</div></div>
          <div class="biz-badges">
            ${badge(b.active?"Active":"Inactive", b.active?"#16a34a":"#9ca3af", b.active?"#f0fdf4":"#f9fafb")}
            ${scorePill(b.score)}
          </div>
        </div>
        <div class="reasoning"><strong>AI Reasoning: </strong>${b.reasoning}</div>
        <div class="sources">${b.sources.map(s=>`<a href="${s.url}" class="source-link">${s.icon} ${s.title}</a>`).join("")}</div>
      </div>`).join("");

  const pipeHtml = a.pipeline.map(s => `
    <div class="pipeline-step">
      <div class="step-icon" style="background:${stepColor[s.status]}20;color:${stepColor[s.status]}">${stepIcon[s.status]}</div>
      <div><div class="step-name">${s.step}</div><div class="step-detail">${s.detail}</div></div>
    </div>`).join("");

  const valHtml = a.validated
    ? `${badge(a.validated==="business_found"?"✓ Business Found On-Site":"✗ No Business Found", a.validated==="business_found"?"#dc2626":"#16a34a", a.validated==="business_found"?"#fef2f2":"#f0fdf4")}
       <div style="margin-top:12px;font-size:13px;color:var(--muted)">Validated on ${a.updated} · ${a.validated==="business_found"?"Matches AI prediction":"Contradicts AI prediction — feedback sent to ML pipeline"}</div>`
    : `<div style="color:var(--muted);font-size:13px;font-style:italic">Not yet validated by field surveyor.</div>`;

  const fromPage = currentRole === "admin" ? "admin-page" : "surveyor-page";

  document.getElementById("detail-content").innerHTML = `
    <button class="btn-back" onclick="showPage('${fromPage}')">← Back</button>
    <div class="card" style="padding:24px;margin-bottom:16px">
      <div class="detail-header">
        <div>
          <div class="detail-meta">Address</div>
          <div class="detail-addr-en">${a.addressEn}</div>
          <div class="detail-addr-he">${a.addressHe}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          ${statusBadge(a.status)}
          <div style="text-align:center">
            <div style="font-size:11px;color:var(--muted);margin-bottom:2px">Suspicion Score</div>
            ${scorePill(a.score)}
          </div>
        </div>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab(this,'tab-businesses')">Businesses</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-pipeline')">Pipeline</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-validation')">Validation</button>
    </div>
    <div id="tab-businesses" class="tab-panel active">${bizHtml}</div>
    <div id="tab-pipeline" class="tab-panel">
      <div class="card" style="padding:24px">
        <div style="font-weight:600;margin-bottom:16px">LangGraph Pipeline Execution</div>
        ${pipeHtml}
      </div>
    </div>
    <div id="tab-validation" class="tab-panel">
      <div class="card" style="padding:24px">
        <div style="font-weight:600;margin-bottom:4px">Field Validation</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:16px">Submitted by field surveyor after on-site visit.</div>
        ${valHtml}
      </div>
    </div>
  `;
  showPage("detail-page");
}

function switchTab(btn, tabId) {
  btn.closest(".tab-bar").querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const bar = btn.closest(".tab-bar");
  let next = bar.nextElementSibling;
  while (next && next.classList.contains("tab-panel")) {
    next.classList.remove("active");
    next = next.nextElementSibling;
  }
  document.getElementById(tabId).classList.add("active");
}

// ── Surveyor ──────────────────────────────────────────────────────────────────
function renderSurveyorList() {
  document.getElementById("surveyor-topbar-title").textContent = "My Assignments";
  const myAddrs = ADDRESSES.filter(a => a.assignedTo === "surveyor1");
  document.getElementById("surveyor-inner").innerHTML = `
    <div class="surveyor-list">
      <div class="surveyor-hint">${myAddrs.length} addresses assigned · tap to inspect</div>
      ${myAddrs.map(a => `
        <button class="addr-card-btn" onclick="renderSurveyorDetail('${a.id}')">
          <div style="text-align:left;flex:1">
            <div style="font-weight:500;font-size:14px">${a.addressEn}</div>
            <div style="font-size:12px;color:var(--muted);direction:rtl;text-align:right;margin-top:2px">${a.addressHe}</div>
            <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
              ${statusBadge(a.status)}
              ${a.validated ? badge("Validated","#16a34a","#f0fdf4") : ""}
            </div>
          </div>
          <div style="text-align:center;flex-shrink:0">
            ${scorePill(a.score)}
            <div style="font-size:11px;color:var(--muted);margin-top:4px">${a.businesses.length} biz</div>
          </div>
        </button>`).join("")}
    </div>`;
}

function renderSurveyorDetail(id) {
  const a = ADDRESSES.find(x => x.id === id);
  if (!a) return;
  document.getElementById("surveyor-topbar-title").textContent = "Address Details";
  const bizHtml = a.businesses.length === 0
    ? `<div class="card biz-mini" style="color:var(--muted);font-size:13px;font-style:italic;padding:14px">No specific businesses flagged. Inspect for any commercial activity.</div>`
    : a.businesses.map(b => `
        <div class="card biz-mini" style="padding:14px;margin-bottom:8px">
          <div style="font-weight:500;font-size:14px">${b.name}</div>
          <div style="font-size:12px;color:var(--muted)">${b.cat}</div>
          <div style="margin-top:6px">${scorePill(b.score)}</div>
        </div>`).join("");

  const footerHtml = a.validated
    ? `<div class="already-validated">
        <div style="font-size:13px;color:#16a34a;font-weight:600">✓ Already validated</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Result: ${a.validated==="business_found"?"Business found on-site":"No business found"}</div>
       </div>`
    : `<button class="validate-btn" onclick="renderValidationForm('${a.id}')">Submit Field Validation →</button>`;

  document.getElementById("surveyor-inner").innerHTML = `
    <div class="surveyor-detail">
      <button class="btn-back" onclick="renderSurveyorList()">← Back</button>
      <div class="card addr-box" style="padding:16px;margin-bottom:12px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">SUSPECTED ADDRESS</div>
        <div style="font-weight:600;font-size:15px">${a.addressEn}</div>
        <div style="font-size:13px;color:var(--muted);direction:rtl;text-align:right;margin-top:2px">${a.addressHe}</div>
        <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
          ${scorePill(a.score)}
          <span style="font-size:12px;color:var(--muted)">AI suspicion score</span>
        </div>
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Businesses to Verify</div>
      ${bizHtml}
      ${footerHtml}
    </div>`;
}

function renderValidationForm(id) {
  const a = ADDRESSES.find(x => x.id === id);
  if (!a) return;
  document.getElementById("surveyor-topbar-title").textContent = "Submit Validation";
  selectedValidation = null;

  document.getElementById("surveyor-inner").innerHTML = `
    <form class="surveyor-form" onsubmit="submitValidation(event,'${id}')">
      <div class="warn-box">
        <div class="warn-title">⚠️ On-site at ${a.addressEn}</div>
        <div class="warn-sub">Please complete this form while physically present at the address.</div>
      </div>
      <div class="form-section">
        <label class="form-label">What did you find? *</label>
        <button type="button" class="option-btn" id="opt-found" onclick="selectOpt('found')">
          <div><div class="option-label" style="color:#dc2626">✓ Business Confirmed</div><div class="option-desc">At least one business is clearly operating here</div></div>
        </button>
        <button type="button" class="option-btn" id="opt-possible" onclick="selectOpt('possible')">
          <div><div class="option-label" style="color:#d97706">⚠ Possible Activity</div><div class="option-desc">Signs of business activity but not confirmed</div></div>
        </button>
        <button type="button" class="option-btn" id="opt-none" onclick="selectOpt('none')">
          <div><div class="option-label" style="color:#16a34a">✗ No Business</div><div class="option-desc">Residential only — no commercial activity found</div></div>
        </button>
      </div>
      <div class="form-section">
        <label class="form-label">Notes</label>
        <textarea class="notes" rows="4" placeholder="Describe what you observed (signage, people, equipment, etc.)"></textarea>
      </div>
      <div class="photo-zone">
        📷 Tap to add photos
        <div class="photo-sub">Photo upload available in production build</div>
      </div>
      <button type="submit" class="submit-btn disabled" id="submit-btn">Submit Validation</button>
    </form>`;
}

function selectOpt(val) {
  selectedValidation = val;
  const map = {found:"selected-red", possible:"selected-yellow", none:"selected-green"};
  ["found","possible","none"].forEach(k => {
    const el = document.getElementById("opt-"+k);
    el.className = "option-btn" + (k===val ? " "+map[k] : "");
  });
  const sb = document.getElementById("submit-btn");
  sb.className = "submit-btn ready";
}

function submitValidation(e, id) {
  e.preventDefault();
  if (!selectedValidation) return;
  showPage("success-page");
  setTimeout(() => {
    renderSurveyorList();
    showPage("surveyor-page");
  }, 2200);
}
</script>
</body>
